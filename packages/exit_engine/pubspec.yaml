name: exit_engine
description: >-
  ExitKompass calculation engine: income tax (M1), social insurance (M2),
  severance/Fünftelregelung (M3) and unemployment benefit ALG 1 (M4) for
  the year 2026. Pure Dart library without Flutter dependency; all
  amounts in cents.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.5.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
